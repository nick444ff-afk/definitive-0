<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SystemX - Pirate Edition</title>
<style>
:root {
    --primary: #FF8C00; /* Laranja vibrante */
    --primary-glow: rgba(255, 140, 0, 0.4);
    --secondary: #FFD700; /* Amarelo Ouro */
    --danger: #FF4500; /* Vermelho Alaranjado */
    --bg-dark: #0d0d0d;
    --card-bg: #1a1a1a;
    --card-border: rgba(255, 140, 0, 0.2);
    --text-main: #f2f2f2;
    --text-muted: #a6a6a6;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at center, #1a0f00 0%, #0d0d0d 100%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
    animation: fadeIn 0.5s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid var(--card-border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.5;
}

.card.bot-ligado {
    border-color: var(--primary);
    box-shadow: 0 0 20px var(--primary-glow);
}

.header {
    text-align: center;
    padding-top: 30px;
}

.logo-container {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
}

.logo {
    width: 100%;
    height: 100%;
    border-radius: 24px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
    border: 2px solid var(--primary);
    transition: transform 0.5s ease;
}

.logo:hover {
    transform: rotate(5deg) scale(1.05);
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
}

.subtitle {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
}

.status-badges {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
}

.badge {
    padding: 6px 14px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.badge-green { background: rgba(0, 255, 127, 0.1); color: #00ff7f; border: 1px solid rgba(0, 255, 127, 0.3); }
.badge-red { background: rgba(255, 69, 0, 0.1); color: #ff4500; border: 1px solid rgba(255, 69, 0, 0.3); }

.bot-tabs {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    padding: 4px;
    margin-top: 25px;
    gap: 4px;
}

.bot-tabs div {
    flex: 1;
    text-align: center;
    padding: 10px 5px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 700;
    font-size: 11px;
    color: var(--text-muted);
}

.bot-tabs div.active {
    background: var(--primary);
    color: #000;
    box-shadow: 0 4px 12px var(--primary-glow);
}

.play-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 20px 0;
}

.play-btn-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #111;
    border: 4px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.play-btn-circle:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px var(--primary-glow);
}

.play-btn-circle:active {
    transform: scale(0.95);
}

.icon-play {
    width: 0;
    height: 0;
    border-left: 30px solid var(--primary);
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    margin-left: 8px;
}

.icon-stop {
    width: 30px;
    height: 30px;
    background: var(--danger);
    border-radius: 6px;
    display: none;
    box-shadow: 0 0 15px var(--danger);
}

.play-btn-circle.ligado {
    border-color: var(--danger);
}

.play-btn-circle.ligado .icon-play { display: none; }
.play-btn-circle.ligado .icon-stop { display: block; }

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.stat-card {
    background: rgba(255,255,255,0.03);
    padding: 15px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
}

.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
.stat-value { font-size: 20px; font-weight: 800; margin-top: 4px; }

.orange-text { color: var(--primary); }
.yellow-text { color: var(--secondary); }
.red-text { color: var(--danger); }

.config-form label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-top: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

input, textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 15px;
    color: #fff;
    font-size: 14px;
    margin-top: 6px;
    outline: none;
    transition: border-color 0.3s;
}

input:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 10px var(--primary-glow);
}

.checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
}

.check-item {
    background: #0d0d0d;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    transition: all 0.2s;
}

.check-item input { width: auto; margin: 0; accent-color: var(--primary); }
.check-item:hover { background: rgba(255, 140, 0, 0.05); }
.check-item.active { border-color: var(--primary); background: rgba(255, 140, 0, 0.1); }

.action-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 20px;
}

.btn-save { background: var(--primary); color: #000; }
.btn-save:hover { background: var(--secondary); transform: translateY(-2px); }
.btn-reset { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
.btn-reset:hover { background: rgba(255, 69, 0, 0.1); color: var(--danger); border-color: var(--danger); }

.logs-container {
    background: #000;
    border-radius: 16px;
    padding: 15px;
    height: 250px;
    overflow-y: auto;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 12px;
    border: 1px solid var(--card-border);
}

.log-line { margin-bottom: 4px; line-height: 1.4; border-left: 2px solid transparent; padding-left: 8px; }
.log-time { color: #555; font-size: 10px; margin-right: 6px; }
.log-info { color: #00bfff; }
.log-success { color: #00ff7f; border-left-color: #00ff7f; }
.log-warn { color: #ffd700; border-left-color: #ffd700; }
.log-error { color: #ff4500; border-left-color: #ff4500; }

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--primary);
    color: #000;
    padding: 12px 25px;
    border-radius: 50px;
    font-weight: 800;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 1000;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 0;
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="logo">
                <img src="logo.png" alt="Pirate Logo">
            </div>
        </div>
        <h1 class="title">SYSTEMX</h1>
        <p class="subtitle">Pirate Automation Panel</p>

        <div class="status-badges">
            <div class="badge badge-red" id="badgeConexao">Offline</div>
            <div class="badge badge-red" id="badgeStatus">Parado</div>
        </div>

        <div class="bot-tabs" id="botTabs">
            <div class="active" data-bot="BOT1" onclick="mudarBot(this)">BOT 1</div>
            <div data-bot="BOT2" onclick="mudarBot(this)">BOT 2</div>
            <div data-bot="BOT3" onclick="mudarBot(this)">BOT 3</div>
            <div data-bot="BOT4" onclick="mudarBot(this)">BOT 4</div>
            <div data-bot="BOT5" onclick="mudarBot(this)">BOT 5</div>
        </div>
    </div>

    <div class="card" id="cardControle">
        <div class="play-section">
            <div class="play-btn-circle" id="playButton" onclick="toggleBot()">
                <div class="icon-play"></div>
                <div class="icon-stop"></div>
            </div>
            <p class="play-label" id="playLabel" style="margin-top: 15px; font-size: 13px; font-weight: 700; color: var(--text-muted);">INICIAR NAVEGAÇÃO</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Entradas</div>
                <div class="stat-value orange-text" id="entradas">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Uptime</div>
                <div class="stat-value yellow-text" id="uptime">00:00:00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Partidas</div>
                <div class="stat-value" style="color: #00ff7f;" id="partidas">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DMs</div>
                <div class="stat-value" style="color: #00bfff;" id="dms">0</div>
            </div>
        </div>
        
        <button class="action-btn btn-reset" onclick="resetStats()">Resetar Estatísticas</button>
    </div>

    <div class="card config-form">
        <h3 style="margin: 0; font-size: 16px; color: var(--primary);">CONFIGURAÇÕES</h3>
        
        <label>Tokens de Acesso</label>
        <textarea id="tokens" rows="3" placeholder="Insira seus tokens (um por linha)"></textarea>

        <label>Categorias de Busca</label>
        <div class="checkbox-group">
            <label class="check-item active"><input type="checkbox" id="catMobile" name="categoria" value="Mobile" checked onchange="updateCheckStyle(this)"><span>Mobile</span></label>
            <label class="check-item"><input type="checkbox" id="catEmulador" name="categoria" value="Emulador" onchange="updateCheckStyle(this)"><span>Emulador</span></label>
            <label class="check-item"><input type="checkbox" id="catMisto" name="categoria" value="Misto" onchange="updateCheckStyle(this)"><span>Misto</span></label>
            <label class="check-item"><input type="checkbox" id="catTatico" name="categoria" value="Tático" onchange="updateCheckStyle(this)"><span>Tático</span></label>
        </div>

        <label>Modos de Jogo</label>
        <div class="checkbox-group">
            <label class="check-item"><input type="checkbox" id="modo1x1" name="modo" value="1v1" onchange="updateCheckStyle(this)"><span>1x1</span></label>
            <label class="check-item active"><input type="checkbox" id="modo2x2" name="modo" value="2v2" checked onchange="updateCheckStyle(this)"><span>2x2</span></label>
            <label class="check-item"><input type="checkbox" id="modo3x3" name="modo" value="3v3" onchange="updateCheckStyle(this)"><span>3x3</span></label>
            <label class="check-item active"><input type="checkbox" id="modo4x4" name="modo" value="4v4" checked onchange="updateCheckStyle(this)"><span>4x4</span></label>
        </div>

        <label>Mensagem Automática</label>
        <input type="text" id="mensagem" placeholder="Mensagem para o canal de partida">

        <label>Menção Automática (s)</label>
        <input type="text" id="mencao" placeholder="Tempo para mencionar (ex: 5)">

        <label>Confirmação Automática (s)</label>
        <input type="text" id="confirmauto" placeholder="Tempo para confirmar (ex: 2)">

        <button class="action-btn btn-save" id="saveBtnConfig" onclick="salvarConfiguracao()">Salvar Configuração</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; font-size: 16px; color: var(--primary);">LOGS DE ATIVIDADE</h3>
            <span style="font-size: 10px; color: var(--text-muted); cursor: pointer;" onclick="limparLogs()">LIMPAR</span>
        </div>
        <div class="logs-container" id="logs"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = window.location.origin;
let botAtivo = 'BOT1';
let botLigado = false;
let uptimeSeconds = 0;
let lastLogTimestamp = null;
let updateInterval = null;

// Otimização: Cache de elementos DOM frequentemente acessados
const elements = {
    badgeConexao: document.getElementById('badgeConexao'),
    badgeStatus: document.getElementById('badgeStatus'),
    playButton: document.getElementById('playButton'),
    playLabel: document.getElementById('playLabel'),
    cardControle: document.getElementById('cardControle'),
    entradas: document.getElementById('entradas'),
    uptime: document.getElementById('uptime'),
    partidas: document.getElementById('partidas'),
    dms: document.getElementById('dms'),
    logs: document.getElementById('logs'),
    tokens: document.getElementById('tokens'),
    mensagem: document.getElementById('mensagem'),
    mencao: document.getElementById('mencao'),
    confirmauto: document.getElementById('confirmauto'),
    toast: document.getElementById('toast')
};

document.addEventListener('DOMContentLoaded', () => {
    addLog('Sistema Pirate inicializado.', 'info');
    startFastUpdate();
});

// Otimização: Loop de atualização unificado e mais rápido
function startFastUpdate() {
    if (updateInterval) clearInterval(updateInterval);
    
    // Atualização rápida de logs e status (cada 1s)
    updateInterval = setInterval(() => {
        fetchStatus();
        fetchLogs();
    }, 1000);

    // Verificação de conexão menos frequente (cada 5s)
    setInterval(checkConnection, 5000);
    checkConnection();
}

async function checkConnection() {
    try {
        const start = performance.now();
        const res = await fetch(`${API_URL}/`, { method: 'HEAD' });
        const end = performance.now();
        
        if (res.ok) {
            elements.badgeConexao.textContent = `Online (${Math.round(end - start)}ms)`;
            elements.badgeConexao.className = 'badge badge-green';
        }
    } catch (e) {
        elements.badgeConexao.textContent = 'Offline';
        elements.badgeConexao.className = 'badge badge-red';
    }
}

async function fetchStatus() {
    try {
        const res = await fetch(`${API_URL}/status/${botAtivo}`);
        const data = await res.json();

        // Atualizar UI de Status
        if (data.is_running) {
            if (!botLigado) {
                botLigado = true;
                elements.badgeStatus.textContent = 'Rodando';
                elements.badgeStatus.className = 'badge badge-green';
                elements.playButton.classList.add('ligado');
                elements.cardControle.classList.add('bot-ligado');
                elements.playLabel.textContent = 'NAVEGANDO...';
                elements.playLabel.style.color = 'var(--danger)';
            }
            
            if (data.stats) {
                elements.entradas.textContent = data.stats.entradas || 0;
                elements.partidas.textContent = data.stats.partidas || 0;
                elements.dms.textContent = data.stats.dms || 0;
            }
            
            if (data.uptime) {
                uptimeSeconds = Math.floor(data.uptime / 1000);
                elements.uptime.textContent = formatUptime(uptimeSeconds);
            }
        } else {
            if (botLigado) {
                botLigado = false;
                elements.badgeStatus.textContent = 'Parado';
                elements.badgeStatus.className = 'badge badge-red';
                elements.playButton.classList.remove('ligado');
                elements.cardControle.classList.remove('bot-ligado');
                elements.playLabel.textContent = 'INICIAR NAVEGAÇÃO';
                elements.playLabel.style.color = 'var(--text-muted)';
                elements.uptime.textContent = '00:00:00';
            }
        }

        // Auto-preenchimento inteligente (apenas se campos estiverem vazios)
        if (data.config && !elements.tokens.value) {
            if (data.config.tokens) elements.tokens.value = data.config.tokens.join('\n');
            if (data.config.msgauto || data.config.mensagem) elements.mensagem.value = data.config.msgauto || data.config.mensagem;
            if (data.config.mentionauto || data.config.mencao) elements.mencao.value = data.config.mentionauto || data.config.mencao;
            if (data.config.confirmauto) elements.confirmauto.value = data.config.confirmauto;
            
            if (data.config.modos) {
                data.config.modos.forEach(m => {
                    const cb = document.querySelector(`input[name="modo"][value="${m}"]`);
                    if (cb) { cb.checked = true; updateCheckStyle(cb); }
                });
            }
            if (data.config.categories) {
                data.config.categories.forEach(c => {
                    const cb = document.querySelector(`input[name="categoria"][value="${c}"]`);
                    if (cb) { cb.checked = true; updateCheckStyle(cb); }
                });
            }
        }
    } catch (e) {}
}

async function fetchLogs() {
    try {
        const res = await fetch(`${API_URL}/logs/${botAtivo}`);
        const data = await res.json();
        const logs = data.logs || [];
        
        const newLogs = lastLogTimestamp 
            ? logs.filter(l => new Date(l.timestamp) > new Date(lastLogTimestamp))
            : logs;

        if (newLogs.length > 0) {
            const fragment = document.createDocumentFragment();
            newLogs.forEach(log => {
                const entry = document.createElement('div');
                entry.className = 'log-line';
                const time = new Date(log.timestamp).toLocaleTimeString();
                entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${log.type}">${log.message}</span>`;
                fragment.appendChild(entry);
            });
            elements.logs.appendChild(fragment);
            elements.logs.scrollTop = elements.logs.scrollHeight;
            lastLogTimestamp = logs[logs.length - 1].timestamp;
        }
    } catch (e) {}
}

function mudarBot(tabEl) {
    const bot = tabEl.getAttribute('data-bot');
    if (bot === botAtivo) return;

    document.querySelectorAll('.bot-tabs div').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    botAtivo = bot;

    // Reset UI para novo bot
    elements.logs.innerHTML = '';
    lastLogTimestamp = null;
    elements.tokens.value = '';
    elements.mensagem.value = '';
    elements.mencao.value = '';
    elements.confirmauto.value = '';
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; updateCheckStyle(cb); });
    
    showToast(`Navegando para ${bot}`, 'info');
    fetchStatus();
}

async function toggleBot() {
    const action = botLigado ? 'stop_bot' : 'start_bot';
    try {
        let body = {};
        if (!botLigado) {
            const categories = [];
            document.querySelectorAll('input[name="categoria"]:checked').forEach(cb => categories.push(cb.value));
            const modos = [];
            document.querySelectorAll('input[name="modo"]:checked').forEach(cb => modos.push(cb.value));
            
            body = {
                tokens: elements.tokens.value.trim(),
                mensagem: elements.mensagem.value.trim(),
                mencao: elements.mencao.value.trim(),
                confirmauto: elements.confirmauto.value.trim(),
                categories: JSON.stringify(categories),
                modos: JSON.stringify(modos)
            };
        }

        const res = await fetch(`${API_URL}/${action}/${botAtivo}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: botLigado ? null : JSON.stringify(body)
        });
        const data = await res.json();
        
        if (data.status === 'success') {
            showToast(botLigado ? 'Âncora lançada!' : 'Velas ao vento!', 'success');
        } else {
            showToast(data.message, 'error');
        }
    } catch (e) {
        showToast('Falha na comunicação!', 'error');
    }
}

async function salvarConfiguracao() {
    const btn = document.getElementById('saveBtnConfig');
    btn.disabled = true;
    btn.textContent = 'SALVANDO...';

    try {
        const categories = [];
        document.querySelectorAll('input[name="categoria"]:checked').forEach(cb => categories.push(cb.value));
        const modos = [];
        document.querySelectorAll('input[name="modo"]:checked').forEach(cb => modos.push(cb.value));

        const formData = new FormData();
        formData.append('bot_id', botAtivo);
        formData.append('tokens', elements.tokens.value.trim());
        formData.append('mensagem', elements.mensagem.value.trim());
        formData.append('mencao', elements.mencao.value.trim());
        formData.append('confirmauto', elements.confirmauto.value.trim());
        formData.append('categories', JSON.stringify(categories));
        formData.append('modos', JSON.stringify(modos));

        const res = await fetch(`${API_URL}/save_config`, { method: 'POST', body: formData });
        if (res.ok) {
            showToast('Tesouro salvo!', 'success');
        } else {
            showToast('Erro ao salvar!', 'error');
        }
    } catch (e) {
        showToast('Erro de conexão!', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar Configuração';
    }
}

async function resetStats() {
    if (!confirm('Deseja resetar as estatísticas deste bot?')) return;
    try {
        await fetch(`${API_URL}/reset_stats/${botAtivo}`, { method: 'POST' });
        showToast('Estatísticas resetadas!', 'warn');
    } catch (e) {}
}

function updateCheckStyle(cb) {
    const label = cb.parentElement;
    if (cb.checked) label.classList.add('active');
    else label.classList.remove('active');
}

function formatUptime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}

function pad(n) { return n.toString().padStart(2, '0'); }

function addLog(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = 'log-line';
    const time = new Date().toLocaleTimeString();
    entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${msg}</span>`;
    elements.logs.appendChild(entry);
    elements.logs.scrollTop = elements.logs.scrollHeight;
}

function showToast(msg, type = 'info') {
    elements.toast.textContent = msg;
    elements.toast.style.background = type === 'error' ? 'var(--danger)' : (type === 'warn' ? 'var(--secondary)' : 'var(--primary)');
    elements.toast.classList.add('show');
    setTimeout(() => elements.toast.classList.remove('show'), 3000);
}

function limparLogs() {
    elements.logs.innerHTML = '';
    showToast('Logs limpos', 'info');
}
</script>
</body>
</html>
