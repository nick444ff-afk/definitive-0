<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SystemX - Pirate Edition</title>
<style>
:root {
    --primary: #FF8C00; /* Laranja vibrante */
    --primary-glow: rgba(255, 140, 0, 0.4);
    --secondary: #FFD700; /* Amarelo Ouro */
    --danger: #FF4500; /* Vermelho Alaranjado */
    --bg-dark: #050c1f;
    --card-bg: #0b1f47;
    --card-gradient: linear-gradient(145deg, #1a0f00, #0d0d0d);
    --text-main: #e5e7eb;
    --text-muted: rgba(255,255,255,0.6);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #0d0d0d, #1a0f00);
    color: var(--text-main);
    min-height: 100vh;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.card {
    background: var(--card-gradient);
    border-radius: 22px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 140, 0, 0.1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    transition: all 0.4s ease;
}

.card.bot-ligado {
    border-color: var(--primary);
    box-shadow: 0 0 30px var(--primary-glow);
}

.header {
    text-align: center;
}

.logo {
    width: 90px;
    height: 90px;
    margin: 0 auto 20px;
    border-radius: 22px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 25px var(--primary-glow);
    border: 2px solid var(--primary);
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    opacity: 0.6;
    font-size: 13px;
    margin-top: 5px;
}

.status {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}

.badge {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.badge-green {
    background: rgba(0, 255, 127, 0.1);
    color: #00ff7f;
    border: 1px solid rgba(0, 255, 127, 0.3);
}

.badge-red {
    background: rgba(255, 69, 0, 0.1);
    color: #ff4500;
    border: 1px solid rgba(255, 69, 0, 0.3);
}

.bot-tabs {
    display: flex;
    background: rgba(0,0,0,0.5);
    border-radius: 30px;
    padding: 6px;
    margin-top: 15px;
    gap: 4px;
}

.bot-tabs div {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
    user-select: none;
    font-size: 12px;
    color: var(--text-muted);
}

.bot-tabs div:hover:not(.active) {
    background: rgba(255,255,255,0.07);
}

.bot-tabs .active {
    background: var(--primary);
    color: #000;
    box-shadow: 0 2px 8px var(--primary-glow);
}

.play-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 30px 0 10px;
}

.play {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
    background: rgba(255, 140, 0, 0.05);
    user-select: none;
}

.play:hover {
    transform: scale(1.06);
    box-shadow: 0 0 30px var(--primary-glow);
}

.play:active {
    transform: scale(0.97);
}

.play .icon-play {
    width: 0;
    height: 0;
    border-left: 32px solid var(--primary);
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    margin-left: 8px;
}

.play .icon-stop {
    width: 26px;
    height: 26px;
    background: var(--danger);
    border-radius: 4px;
    display: none;
    animation: blink 1.2s infinite;
}

.play.ligado {
    border-color: var(--danger);
    box-shadow: 0 0 35px var(--danger), 0 0 60px rgba(255,69,0,0.2);
    background: rgba(255,69,0,0.08);
}

.play.ligado .icon-play { display: none; }
.play.ligado .icon-stop { display: block; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
}

.play-label {
    margin-top: 14px;
    font-size: 13px;
    opacity: 0.65;
    text-align: center;
    transition: color 0.3s;
    letter-spacing: 0.5px;
    font-weight: 700;
}

.play-label.ligado {
    color: var(--danger);
    opacity: 1;
}

.card.stat {
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.stat-title {
    font-size: 14px;
    opacity: 0.65;
    font-weight: 500;
}

.stat-value {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
}

.orange-text { color: var(--primary); }
.yellow-text { color: var(--secondary); }
.green-text  { color: #00ff7f; }
.cyan-text   { color: #00bfff; }

.reset-container {
    margin: 0 0 20px;
}

.reset-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 140, 0, 0.2);
    background: rgba(255, 140, 0, 0.05);
    color: var(--primary);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
}

.reset-btn:hover {
    background: rgba(255, 140, 0, 0.15);
    border-color: var(--primary);
}

label {
    margin-top: 15px;
    display: block;
    font-size: 14px;
    font-weight: 600;
    opacity: 0.85;
    color: var(--primary);
}

input, textarea {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.07);
    background: #000;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

input:focus, textarea:focus {
    border-color: var(--primary);
}

.orgs-box {
    background: #000;
    border-radius: 14px;
    padding: 10px 15px;
    max-height: 180px;
    overflow-y: auto;
    margin-top: 8px;
    border: 1px solid rgba(255, 140, 0, 0.1);
}

.org-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 5px;
    cursor: pointer;
    font-size: 15px;
    border-radius: 8px;
    transition: background 0.2s;
}

.org-item:hover {
    background: rgba(255,255,255,0.04);
}

.org-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
}

.save-btn {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #000;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
}

.save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px var(--primary-glow);
}

.logs {
    background: #000;
    padding: 15px;
    border-radius: 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    height: 200px;
    overflow-y: auto;
    line-height: 1.6;
    border: 1px solid rgba(255, 140, 0, 0.1);
}

.log-line { margin-bottom: 4px; }
.log-time { color: #555; margin-right: 6px; }
.log-info { color: #00bfff; }
.log-success { color: #00ff7f; }
.log-warn { color: #ffd700; }
.log-error { color: #ff4500; }

.clear-logs-btn {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text-muted);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--primary);
    color: #000;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    z-index: 9999;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    opacity: 0;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

</style>
</head>
<body>
<div class="container">

    <div class="card header">
        <div class="logo">
            <img src="logo.png" alt="Pirate Logo">
        </div>
        <h1 class="title">SystemX</h1>
        <p class="subtitle">PIRATE AUTOMATION PANEL</p>

        <div class="status">
            <div class="badge badge-red" id="badgeConexao">Offline</div>
            <div class="badge badge-red" id="badgeStatus">Parado</div>
        </div>

        <div class="bot-tabs" id="botTabs">
            <div class="active" data-bot="BOT1" onclick="mudarBot(this)">BOT1</div>
            <div data-bot="BOT2" onclick="mudarBot(this)">BOT2</div>
            <div data-bot="BOT3" onclick="mudarBot(this)">BOT3</div>
            <div data-bot="BOT4" onclick="mudarBot(this)">BOT4</div>
            <div data-bot="BOT5" onclick="mudarBot(this)">BOT5</div>
        </div>

        <p class="play-label" id="instancia" style="margin-top: 15px;">INSTÂNCIA ATIVA: BOT 1</p>
    </div>

    <div class="card" id="cardControle">
        <div class="play-wrapper">
            <div class="play" id="playButton" onclick="toggleBot()">
                <div class="icon-play"></div>
                <div class="icon-stop"></div>
            </div>
            <p class="play-label" id="playLabel">Clique para iniciar o bot</p>
        </div>
    </div>

    <div class="card stat">
        <div class="stat-title">Entradas</div>
        <div class="stat-value orange-text" id="entradas">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">Na Fila</div>
        <div class="stat-value green-text" id="naFila">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">Partidas</div>
        <div class="stat-value yellow-text" id="partidas">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">DMs</div>
        <div class="stat-value cyan-text" id="dms">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">Uptime</div>
        <div class="stat-value" style="color: #fff;" id="uptime">00:00:00</div>
    </div>

    <div class="reset-container">
        <button class="reset-btn" onclick="resetStats()">RESETAR ESTATÍSTICAS</button>
    </div>

    <div class="card">
        <h3 style="color: var(--primary); margin: 0; font-size: 16px;">CONFIGURAÇÃO</h3>

        <label>Tokens de Acesso</label>
        <textarea id="tokens" rows="3" placeholder="Insira seus tokens (um por linha)"></textarea>

        <label>Categorias de Busca</label>
        <div class="orgs-box">
            <label class="org-item"><input type="checkbox" id="catMobile" name="categoria" value="Mobile" checked><span>Mobile</span></label>
            <label class="org-item"><input type="checkbox" id="catEmulador" name="categoria" value="Emulador"><span>Emulador</span></label>
            <label class="org-item"><input type="checkbox" id="catMisto" name="categoria" value="Misto"><span>Misto</span></label>
            <label class="org-item"><input type="checkbox" id="catTatico" name="categoria" value="Tático"><span>Tático</span></label>
        </div>

        <label>Modos de Jogo</label>
        <div class="orgs-box">
            <label class="org-item"><input type="checkbox" id="modo1x1" name="modo" value="1v1"><span>1x1</span></label>
            <label class="org-item"><input type="checkbox" id="modo2x2" name="modo" value="2v2" checked><span>2x2</span></label>
            <label class="org-item"><input type="checkbox" id="modo3x3" name="modo" value="3v3"><span>3x3</span></label>
            <label class="org-item"><input type="checkbox" id="modo4x4" name="modo" value="4v4" checked><span>4x4</span></label>
        </div>

        <label>Mensagem Automática</label>
        <input type="text" id="mensagem" placeholder="Digite a mensagem">

        <label>Delay da Mensagem (s)</label>
        <input type="text" id="msgdelay" placeholder="Tempo para enviar a mensagem (ex: 12)">

        <label>Menção Automática (s)</label>
        <input type="text" id="mencao" placeholder="Tempo para mencionar (ex: 5)">

        <label>Confirmação Automática (s)</label>
        <input type="text" id="confirmauto" placeholder="Tempo para confirmar (ex: 2)">

        <button class="save-btn" id="saveBtnConfig" onclick="salvarConfiguracao()">SALVAR CONFIGURAÇÃO</button>
    </div>

    <div class="card">
        <h3 style="color: var(--primary); margin: 0 0 15px; font-size: 16px;">LOGS DE ATIVIDADE</h3>
        <div class="logs" id="logs"></div>
        <button class="clear-logs-btn" onclick="limparLogs()">LIMPAR LOGS</button>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = window.location.origin;
let botAtivo = 'BOT1';
let botLigado = false;
let lastLogTimestamp = null;
let updateInterval = null;

    const elements = {
    badgeConexao: document.getElementById('badgeConexao'),
    badgeStatus: document.getElementById('badgeStatus'),
    playButton: document.getElementById('playButton'),
    playLabel: document.getElementById('playLabel'),
    cardControle: document.getElementById('cardControle'),
    entradas: document.getElementById('entradas'),
    uptime: document.getElementById('uptime'),
    partidas: document.getElementById('partidas'),
    dms: document.getElementById('dms'),
    logs: document.getElementById('logs'),
    tokens: document.getElementById('tokens'),
    mensagem: document.getElementById('mensagem'),
    msgdelay: document.getElementById('msgdelay'),
    mencao: document.getElementById('mencao'),
    confirmauto: document.getElementById('confirmauto'),
    toast: document.getElementById('toast')
};

document.addEventListener('DOMContentLoaded', () => {
    addLog('Sistema Pirate restaurado.', 'info');
    startFastUpdate();
});

function startFastUpdate() {
    if (updateInterval) clearInterval(updateInterval);
    updateInterval = setInterval(() => {
        fetchStatus();
        fetchLogs();
    }, 1000);
    setInterval(checkConnection, 5000);
    checkConnection();
}

async function checkConnection() {
    try {
        const start = performance.now();
        const res = await fetch(`${API_URL}/`, { method: 'HEAD' });
        const end = performance.now();
        if (res.ok) {
            elements.badgeConexao.textContent = `Online (${Math.round(end - start)}ms)`;
            elements.badgeConexao.className = 'badge badge-green';
        }
    } catch (e) {
        elements.badgeConexao.textContent = 'Offline';
        elements.badgeConexao.className = 'badge badge-red';
    }
}

async function fetchStatus() {
    try {
        const res = await fetch(`${API_URL}/status/${botAtivo}`);
        const data = await res.json();

        if (data.is_running) {
            if (!botLigado) {
                botLigado = true;
                elements.badgeStatus.textContent = 'Rodando';
                elements.badgeStatus.className = 'badge badge-green';
                elements.playButton.classList.add('ligado');
                elements.cardControle.classList.add('bot-ligado');
                elements.playLabel.textContent = 'NAVEGANDO...';
                elements.playLabel.classList.add('ligado');
            }
            if (data.stats) {
                elements.entradas.textContent = data.stats.entradas || 0;
                elements.partidas.textContent = data.stats.partidas || 0;
                elements.dms.textContent = data.stats.dms || 0;
            }
            if (data.uptime) elements.uptime.textContent = formatUptime(Math.floor(data.uptime / 1000));
        } else {
            if (botLigado) {
                botLigado = false;
                elements.badgeStatus.textContent = 'Parado';
                elements.badgeStatus.className = 'badge badge-red';
                elements.playButton.classList.remove('ligado');
                elements.cardControle.classList.remove('bot-ligado');
                elements.playLabel.textContent = 'Clique para iniciar o bot';
                elements.playLabel.classList.remove('ligado');
                elements.uptime.textContent = '00:00:00';
            }
        }

        if (data.config && !elements.tokens.value) {
            if (data.config.tokens) elements.tokens.value = data.config.tokens.join('\n');
            if (data.config.msgauto || data.config.mensagem) elements.mensagem.value = data.config.msgauto || data.config.mensagem;
            if (data.config.msgdelay) elements.msgdelay.value = data.config.msgdelay;
            if (data.config.mentionauto || data.config.mencao) elements.mencao.value = data.config.mentionauto || data.config.mencao;
            if (data.config.confirmauto) elements.confirmauto.value = data.config.confirmauto;
            if (data.config.modos) data.config.modos.forEach(m => {
                const cb = document.querySelector(`input[name="modo"][value="${m}"]`);
                if (cb) cb.checked = true;
            });
            if (data.config.categories) data.config.categories.forEach(c => {
                const cb = document.querySelector(`input[name="categoria"][value="${c}"]`);
                if (cb) cb.checked = true;
            });
        }
    } catch (e) {}
}

async function fetchLogs() {
    try {
        const res = await fetch(`${API_URL}/logs/${botAtivo}`);
        const data = await res.json();
        const logs = data.logs || [];
        const newLogs = lastLogTimestamp ? logs.filter(l => new Date(l.timestamp) > new Date(lastLogTimestamp)) : logs;
        if (newLogs.length > 0) {
            newLogs.forEach(log => addLog(log.message, log.type));
            lastLogTimestamp = logs[logs.length - 1].timestamp;
        }
    } catch (e) {}
}

function mudarBot(tabEl) {
    const bot = tabEl.getAttribute('data-bot');
    if (bot === botAtivo) return;
    document.querySelectorAll('.bot-tabs div').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    botAtivo = bot;
    elements.logs.innerHTML = '';
    lastLogTimestamp = null;
    elements.tokens.value = '';
    elements.mensagem.value = '';
    elements.msgdelay.value = '';
    elements.mencao.value = '';
    elements.confirmauto.value = '';
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.getElementById('instancia').textContent = `INSTÂNCIA ATIVA: ${bot.replace('BOT', 'Bot ')}`;
    showToast(`Navegando para ${bot}`, 'info');
    fetchStatus();
}

async function toggleBot() {
    const action = botLigado ? 'stop_bot' : 'start_bot';
    try {
        let body = {};
        if (!botLigado) {
            const categories = [];
            document.querySelectorAll('input[name="categoria"]:checked').forEach(cb => categories.push(cb.value));
            const modos = [];
            document.querySelectorAll('input[name="modo"]:checked').forEach(cb => modos.push(cb.value));
            body = {
                tokens: elements.tokens.value.trim(),
                mensagem: elements.mensagem.value.trim(),
                msgdelay: elements.msgdelay.value.trim(),
                mencao: elements.mencao.value.trim(),
                confirmauto: elements.confirmauto.value.trim(),
                categories: JSON.stringify(categories),
                modos: JSON.stringify(modos)
            };
        }
        const res = await fetch(`${API_URL}/${action}/${botAtivo}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: botLigado ? null : JSON.stringify(body)
        });
        const data = await res.json();
        if (data.status === 'success') showToast(botLigado ? 'Âncora lançada!' : 'Velas ao vento!', 'success');
        else showToast(data.message, 'error');
    } catch (e) { showToast('Falha na comunicação!', 'error'); }
}

async function salvarConfiguracao() {
    const btn = document.getElementById('saveBtnConfig');
    btn.disabled = true;
    try {
        const categories = [];
        document.querySelectorAll('input[name="categoria"]:checked').forEach(cb => categories.push(cb.value));
        const modos = [];
        document.querySelectorAll('input[name="modo"]:checked').forEach(cb => modos.push(cb.value));
        const formData = new FormData();
        formData.append('bot_id', botAtivo);
        formData.append('tokens', elements.tokens.value.trim());
        formData.append('mensagem', elements.mensagem.value.trim());
        formData.append('msgdelay', elements.msgdelay.value.trim());
        formData.append('mencao', elements.mencao.value.trim());
        formData.append('confirmauto', elements.confirmauto.value.trim());
        formData.append('categories', JSON.stringify(categories));
        formData.append('modos', JSON.stringify(modos));
        const res = await fetch(`${API_URL}/save_config`, { method: 'POST', body: formData });
        if (res.ok) showToast('Tesouro salvo!', 'success');
        else showToast('Erro ao salvar!', 'error');
    } catch (e) { showToast('Erro de conexão!', 'error'); }
    finally { btn.disabled = false; }
}

async function resetStats() {
    if (!confirm('Deseja resetar as estatísticas?')) return;
    try {
        await fetch(`${API_URL}/reset_stats/${botAtivo}`, { method: 'POST' });
        showToast('Estatísticas resetadas!', 'warn');
    } catch (e) {}
}

function formatUptime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}

function pad(n) { return n.toString().padStart(2, '0'); }

function addLog(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = 'log-line';
    const time = new Date().toLocaleTimeString();
    entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${msg}</span>`;
    elements.logs.appendChild(entry);
    elements.logs.scrollTop = elements.logs.scrollHeight;
}

function showToast(msg, type = 'info') {
    elements.toast.textContent = msg;
    elements.toast.style.background = type === 'error' ? 'var(--danger)' : (type === 'warn' ? 'var(--secondary)' : 'var(--primary)');
    elements.toast.classList.add('show');
    setTimeout(() => elements.toast.classList.remove('show'), 3000);
}

function limparLogs() {
    elements.logs.innerHTML = '';
    showToast('Logs limpos', 'info');
}
</script>
</body>
</html>
